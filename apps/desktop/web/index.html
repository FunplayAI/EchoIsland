<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EchoIsland</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <section id="island" class="island" data-mode="compact">
        <header id="islandBar" class="island-bar">
          <div class="completion-breath-light" aria-hidden="true"></div>
          <div class="compact-left">
            <div id="mascotShell" class="mascot-shell" data-has-mascot="false" data-tauri-drag-region>
              <canvas id="mascotCanvas" class="mascot-canvas" width="30" height="30"></canvas>
              <div id="mascotCompletionBadge" class="mascot-completion-badge" hidden>1</div>
              <div id="brandDot" class="brand-dot"></div>
            </div>
            <button
              id="settingsBtn"
              class="expanded-edge-action expanded-edge-action-left"
              type="button"
              title="Settings"
              aria-label="Settings"
            >
              ⚙
            </button>
            <div class="compact-copy" data-tauri-drag-region>
              <strong id="headline">Idle and watching</strong>
            </div>
          </div>

          <div class="compact-right">
            <button
              id="quitBtn"
              class="expanded-edge-action expanded-edge-action-right"
              type="button"
              title="Quit EchoIsland"
              aria-label="Quit EchoIsland"
            >
              ⏻
            </button>
            <div class="task-inline" data-tauri-drag-region>
              <strong id="activeCount">0</strong>
              <span class="task-slash">/</span>
              <strong id="totalCountCompact">0</strong>
            </div>
          </div>

        </header>

        <section class="island-panel">
          <section class="panel panel-main panel-sessions-only">
            <div id="sessionList" class="session-list"></div>
            <section id="settingsPanel" class="settings-panel" hidden>
              <article class="settings-card">
                <header class="settings-card-header">
                  <h2>Settings</h2>
                  <span>EchoIsland v0.5.0</span>
                </header>
                <div class="settings-option">
                  <div class="settings-option-copy">
                    <strong>Island Display</strong>
                  </div>
                  <select id="displaySelect" class="settings-select" data-keep-open="true"></select>
                </div>
                <div class="settings-option">
                  <div class="settings-option-copy">
                    <strong>Mute Completion Sound</strong>
                  </div>
                  <label class="settings-switch" data-keep-open="true">
                    <input id="completionSoundToggle" type="checkbox" />
                    <span class="settings-switch-track" aria-hidden="true">
                      <span class="settings-switch-thumb"></span>
                    </span>
                  </label>
                </div>
                <div class="settings-option">
                  <div class="settings-option-copy">
                    <strong>Hide Mascot</strong>
                  </div>
                  <label class="settings-switch" data-keep-open="true">
                    <input id="mascotToggle" type="checkbox" />
                    <span class="settings-switch-track" aria-hidden="true">
                      <span class="settings-switch-thumb"></span>
                    </span>
                  </label>
                </div>
                <div class="settings-option">
                  <div class="settings-option-copy">
                    <strong>Update & Upgrade</strong>
                  </div>
                  <button id="openReleasePageBtn" class="settings-pill-button" type="button" data-keep-open="true">
                    Open
                  </button>
                </div>
              </article>
            </section>
          </section>
        </section>
      </section>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
